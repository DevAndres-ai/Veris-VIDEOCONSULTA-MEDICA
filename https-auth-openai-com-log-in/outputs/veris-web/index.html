<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERIS: VIDEO CONSULTA MÉDICA</title>
  <style>
    :root {
      --azul-oscuro: #0b3558;
      --azul: #1266a8;
      --celeste: #dff5ff;
      --celeste-claro: #effaff;
      --gris: #eef3f6;
      --linea: #d7e7f0;
      --blanco: #ffffff;
      --sombra: 0 18px 45px rgba(18, 102, 168, 0.13);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--azul-oscuro);
      background: #f4fbff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f4fbff 0%, #ffffff 48%, #eef7fc 100%);
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--azul);
      color: var(--blanco);
      padding: 11px 17px;
      cursor: pointer;
      transition: 0.18s ease;
    }
    button:hover { background: var(--azul-oscuro); transform: translateY(-1px); }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--linea);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--azul-oscuro);
      background: var(--blanco);
    }
    textarea { min-height: 88px; resize: vertical; }
    label { display: grid; gap: 7px; color: #31566f; font-weight: 700; font-size: .92rem; }
    h1, h2, h3, p { margin-top: 0; }

    .topbar {
      min-height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px clamp(18px, 4vw, 56px);
      background: rgba(255,255,255,.95);
      border-bottom: 1px solid var(--linea);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--azul-oscuro); }
    .brand span:first-child {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: var(--celeste);
      color: var(--azul);
      border: 1px solid var(--linea);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--linea);
      background: var(--celeste-claro);
      padding: 9px 13px;
      color: var(--azul-oscuro);
      font-size: .92rem;
    }
    .ghost { background: var(--celeste-claro); color: var(--azul); border: 1px solid var(--linea); }
    .wrap { max-width: 1220px; margin: 0 auto; padding: clamp(28px, 5vw, 58px) clamp(16px, 4vw, 46px); }
    .heroText { text-align: center; max-width: 820px; margin: 0 auto 28px; }
    .eyebrow { color: var(--azul); font-weight: 900; text-transform: uppercase; font-size: .82rem; }
    h1 { font-size: clamp(2rem, 5vw, 3.4rem); line-height: 1.05; color: var(--azul-oscuro); }
    .heroText p, .muted { color: #557083; line-height: 1.6; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; }
    .summary { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 16px; margin-bottom: 22px; }
    .card, .roleCard, .summaryCard {
      background: rgba(255,255,255,.96);
      border: 1px solid var(--linea);
      border-radius: 24px;
      box-shadow: var(--sombra);
      padding: 26px;
    }
    .roleCard { min-height: 300px; display: grid; gap: 16px; }
    .roleIcon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--celeste);
      border: 1px solid var(--linea);
      color: var(--azul);
      font-size: 1.7rem;
    }
    .form { display: grid; gap: 15px; }
    .wide { grid-column: 1 / -1; }
    .alert { background: var(--celeste-claro); border: 1px solid #b9dce9; border-radius: 16px; padding: 12px; font-weight: 700; }
    .summaryCard { min-height: 118px; display: grid; gap: 7px; }
    .summaryCard span { color: #59778a; font-size: .9rem; font-weight: 700; }
    .summaryCard strong { font-size: 1.3rem; }
    .tableWrap { overflow-x: auto; }
    table { width: 100%; min-width: 920px; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--linea); padding: 12px 10px; text-align: left; vertical-align: top; color: #284c65; }
    th { background: var(--celeste-claro); color: var(--azul-oscuro); font-size: .84rem; }
    td button { margin: 2px; padding: 8px 11px; font-size: .86rem; }
    .stack { display: grid; gap: 10px; margin-top: 14px; }
    .row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border: 1px solid var(--linea); border-radius: 16px; background: var(--celeste-claro); }
    footer { background: var(--azul-oscuro); color: var(--blanco); text-align: center; padding: 26px; margin-top: 30px; }
    @media (max-width: 980px) { .grid3, .grid2 { grid-template-columns: 1fr; } .summary { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .topbar { align-items: flex-start; flex-direction: column; } .summary { grid-template-columns: 1fr; } .card, .roleCard, .summaryCard { border-radius: 18px; padding: 20px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span>+</span><span>VERIS: VIDEO CONSULTA MÉDICA</span></div>
    <div id="sessionArea" class="pill">Plataforma académica de videoconsultas</div>
  </header>

  <main id="app"></main>

  <footer>VERIS: VIDEO CONSULTA MÉDICA · Proyecto académico con LocalStorage y enlaces externos de Zoom.</footer>

  <script>
    const APP = "VERIS: VIDEO CONSULTA MÉDICA";
    const K = {
      users: "veris_users",
      doctors: "veris_doctors",
      specialties: "veris_specialties",
      appointments: "veris_appointments",
      family: "veris_family",
      documents: "veris_documents",
      session: "veris_session",
      role: "veris_role"
    };
    const statuses = ["Pendiente de pago", "Confirmada", "En consulta", "Finalizada", "Cancelada"];
    const baseSpecialties = ["Medicina General", "Medicina Interna", "Pediatría", "Ginecología", "Dermatología", "Cardiología", "Traumatología"];
    const baseDoctors = [
      ["doctor-demo", "Dr. Andrés Molina", "doctor@demo.com", "Medicina General"],
      ["doctor-camila", "Dra. Camila Torres", "camila@demo.com", "Pediatría"],
      ["doctor-fernanda", "Dra. Fernanda Ruiz", "fernanda@demo.com", "Dermatología"],
      ["doctor-carlos", "Dr. Carlos Vega", "carlos@demo.com", "Cardiología"],
      ["doctor-andrea", "Dra. Andrea Salazar", "andrea@demo.com", "Ginecología"],
      ["doctor-mateo", "Dr. Mateo Ríos", "mateo@demo.com", "Traumatología"]
    ].map(d => ({ id: d[0], name: d[1], email: d[2], password: "123456", role: "doctor", specialty: d[3], phone: "099 000 0000", status: "Activo", zoom: "https://zoom.us/j/123456789" }));

    const read = (key, fallback = []) => JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
    const write = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    const id = prefix => `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const safe = user => { const copy = { ...user }; delete copy.password; return copy; };

    function seedDemoData() {
      if (!localStorage.getItem(K.specialties)) write(K.specialties, baseSpecialties.map(name => ({ id: id("esp"), name })));
      if (!localStorage.getItem(K.doctors)) write(K.doctors, baseDoctors);
      if (!localStorage.getItem(K.users)) write(K.users, [
        { id: "admin-demo", name: "Admin VERIS", email: "admin@demo.com", password: "123456", role: "admin" },
        { id: "patient-demo", name: "Paciente Demo", email: "paciente@demo.com", password: "123456", role: "patient" },
        ...baseDoctors
      ]);
      if (!localStorage.getItem(K.appointments)) write(K.appointments, [{
        id: "appointment-demo", patientId: "patient-demo", patientName: "Paciente Demo", doctorId: "doctor-demo", doctorName: "Dr. Andrés Molina",
        specialty: "Medicina General", date: new Date().toISOString().slice(0,10), time: "09:30", reason: "Control general", insurance: "Particular",
        status: "Confirmada", meetingUrl: "https://zoom.us/j/123456789"
      }]);
      if (!localStorage.getItem(K.family)) write(K.family, []);
      if (!localStorage.getItem(K.documents)) write(K.documents, []);
    }

    function setSession(user) {
      write(K.session, safe(user));
      localStorage.setItem(K.role, user.role);
      render();
    }
    function logout() {
      localStorage.removeItem(K.session);
      localStorage.removeItem(K.role);
      renderRoles();
    }
    function currentUser() { return read(K.session, null); }
    function roleName(role) { return role === "patient" ? "Paciente" : role === "doctor" ? "Doctor" : "Administrador"; }

    function updateHeader() {
      const user = currentUser();
      document.getElementById("sessionArea").innerHTML = user
        ? `<span>${roleName(user.role)}: ${user.name}</span> <button class="ghost" onclick="logout()">Cerrar sesión</button>`
        : "Plataforma académica de videoconsultas";
    }

    function renderRoles() {
      updateHeader();
      document.getElementById("app").innerHTML = `
        <section class="wrap">
          <div class="heroText">
            <span class="eyebrow">Acceso seguro por roles</span>
            <h1>Bienvenido a ${APP}</h1>
            <p>Selecciona tu tipo de acceso para continuar con la plataforma de videoconsultas médicas.</p>
          </div>
          <div class="grid3">
            ${roleCard("patient", "Paciente", "Agenda videoconsultas, revisa tus citas vigentes y consulta tu historial clínico simulado.", "Ingresar como paciente", "👤")}
            ${roleCard("doctor", "Doctor", "Revisa tus consultas asignadas, atiende pacientes y genera documentos médicos simulados.", "Ingresar como doctor", "⚕")}
            ${roleCard("admin", "Administrador", "Gestiona usuarios, médicos, especialidades, horarios y citas dentro del sistema.", "Ingresar como administrador", "✓")}
          </div>
        </section>`;
    }

    function roleCard(role, title, text, button, icon) {
      return `<article class="roleCard"><div class="roleIcon">${icon}</div><h2>${title}</h2><p class="muted">${text}</p><button onclick="renderLogin('${role}')">${button}</button></article>`;
    }

    function renderLogin(role, mode = "login", msg = "") {
      updateHeader();
      const register = role === "patient" && mode === "register";
      document.getElementById("app").innerHTML = `
        <section class="wrap grid2">
          <div class="card">
            <button class="ghost" onclick="renderRoles()">Volver a selección de rol</button>
            <h1>${register ? "Registro de Paciente" : "Iniciar sesión como " + roleName(role)}</h1>
            <p class="muted">${APP}</p>
            <form class="form" onsubmit="${register ? "registerPatient(event)" : `login(event, '${role}')`}">
              ${register ? `<label>Nombre completo<input id="name" required></label>` : ""}
              <label>Correo electrónico<input id="email" type="email" required></label>
              <label>Contraseña<input id="password" type="password" required></label>
              ${msg ? `<p class="alert">${msg}</p>` : ""}
              <button type="submit">${register ? "Registrar paciente" : "Ingresar"}</button>
            </form>
            ${role === "patient" ? `<br><button class="ghost" onclick="renderLogin('patient','${register ? "login" : "register"}')">${register ? "Ya tengo cuenta" : "Crear cuenta de paciente"}</button>` : ""}
          </div>
          <aside class="card">
            <h2>Credenciales de prueba</h2>
            <p><b>Paciente:</b> paciente@demo.com / 123456</p>
            <p><b>Doctor:</b> doctor@demo.com / 123456</p>
            <p><b>Administrador:</b> admin@demo.com / 123456</p>
          </aside>
        </section>`;
    }

    function login(event, role) {
      event.preventDefault();
      const email = document.getElementById("email").value.toLowerCase();
      const password = document.getElementById("password").value;
      const user = read(K.users).find(u => u.email.toLowerCase() === email && u.password === password && u.role === role);
      if (!user) return renderLogin(role, "login", "Credenciales incorrectas para el rol seleccionado.");
      setSession(user);
    }

    function registerPatient(event) {
      event.preventDefault();
      const users = read(K.users);
      const email = document.getElementById("email").value.toLowerCase();
      if (users.some(u => u.email.toLowerCase() === email)) return renderLogin("patient", "register", "Ya existe un usuario con ese correo.");
      const user = { id: id("patient"), name: document.getElementById("name").value, email, password: document.getElementById("password").value, role: "patient" };
      write(K.users, [...users, user]);
      setSession(user);
    }

    function render() {
      seedDemoData();
      updateHeader();
      const user = currentUser();
      if (!user) return renderRoles();
      if (user.role === "patient") return patientPanel(user);
      if (user.role === "doctor") return doctorPanel(user);
      if (user.role === "admin") return adminPanel(user);
      renderRoles();
    }

    function summary(cards) {
      return `<div class="summary">${cards.map(c => `<article class="summaryCard"><span>${c[0]}</span><strong>${c[1]}</strong></article>`).join("")}</div>`;
    }

    function patientPanel(user) {
      const appts = read(K.appointments).filter(a => a.patientId === user.id);
      const doctors = read(K.doctors).filter(d => d.status === "Activo");
      const specialties = read(K.specialties);
      const family = read(K.family).filter(f => f.patientId === user.id);
      const docs = read(K.documents).filter(d => d.patientId === user.id);
      const next = appts.find(a => !["Finalizada","Cancelada"].includes(a.status));
      document.getElementById("app").innerHTML = `
        <section class="wrap">
          <span class="eyebrow">${APP}</span><h1>Panel del Paciente</h1><p class="muted">Bienvenido, ${user.name}</p>
          ${summary([["Próxima cita", next ? `${next.date} ${next.time}` : "Sin cita vigente"], ["Citas confirmadas", appts.filter(a => a.status === "Confirmada").length], ["Familiares registrados", family.length], ["Documentos médicos simulados", docs.length], ["Historial", docs.length]])}
          <div class="grid2">
            <div class="card"><h2>Agregar familiar o amigo</h2><form class="form" onsubmit="addFamily(event)"><label>Nombre<input id="familyName" required></label><button>Guardar familiar</button></form><div class="stack">${family.map(f => `<div class="row">${f.name}</div>`).join("") || `<p class="muted">Sin familiares registrados.</p>`}</div></div>
            <div class="card"><h2>Agendar cita online</h2><form class="form" onsubmit="bookAppointment(event)">
              <label>Seleccionar paciente<select id="patientName"><option>${user.name}</option>${family.map(f => `<option>${f.name}</option>`).join("")}</select></label>
              <label>Especialidad<select id="specialty">${specialties.map(s => `<option>${s.name}</option>`).join("")}</select></label>
              <label>Médico<select id="doctorId">${doctors.map(d => `<option value="${d.id}">${d.name} - ${d.specialty}</option>`).join("")}</select></label>
              <label>Fecha<input id="date" type="date" required></label><label>Hora<input id="time" type="time" required></label>
              <label>Convenio o seguro<select id="insurance"><option>Particular</option><option>Seguro privado</option><option>Convenio empresarial</option></select></label>
              <label class="wide">Motivo de consulta<textarea id="reason" required></textarea></label><button>Reservar cita</button>
            </form></div>
          </div>
          <div class="card"><h2>Citas vigentes</h2>${apptTable(appts, "patient")}</div>
          <div class="card"><h2>Historial clínico simulado</h2>${docs.map(d => `<div class="row"><div><b>${d.createdAt}</b><p>Receta: ${d.documents.prescription || "No registrada"}</p><p>Recomendaciones: ${d.documents.recommendations || "No registradas"}</p><p>Órdenes: ${d.documents.orders || "No registradas"}</p><p>Certificado: ${d.documents.certificate || "No registrado"}</p></div></div>`).join("") || `<p class="muted">Aún no hay documentos médicos simulados.</p>`}</div>
        </section>`;
    }

    function addFamily(event) {
      event.preventDefault();
      const user = currentUser();
      write(K.family, [...read(K.family), { id: id("family"), patientId: user.id, name: document.getElementById("familyName").value }]);
      render();
    }

    function bookAppointment(event) {
      event.preventDefault();
      const user = currentUser();
      const doctor = read(K.doctors).find(d => d.id === document.getElementById("doctorId").value);
      write(K.appointments, [...read(K.appointments), {
        id: id("appointment"), patientId: user.id, patientName: document.getElementById("patientName").value, doctorId: doctor.id, doctorName: doctor.name,
        specialty: document.getElementById("specialty").value, date: document.getElementById("date").value, time: document.getElementById("time").value,
        reason: document.getElementById("reason").value, insurance: document.getElementById("insurance").value, status: "Pendiente de pago", meetingUrl: doctor.zoom || ""
      }]);
      render();
    }

    function apptTable(appts, context) {
      if (!appts.length) return `<p class="muted">No hay citas registradas.</p>`;
      return `<div class="tableWrap"><table><thead><tr><th>Paciente</th><th>Doctor</th><th>Especialidad</th><th>Fecha</th><th>Hora</th><th>Motivo</th><th>Estado</th><th>Zoom</th><th>Acciones</th></tr></thead><tbody>
        ${appts.map(a => `<tr><td>${a.patientName}</td><td>${a.doctorName}</td><td>${a.specialty}</td><td>${a.date}</td><td>${a.time}</td><td>${a.reason}</td><td>${a.status}</td><td>${a.meetingUrl || "Pendiente"}</td><td>${apptActions(a, context)}</td></tr>`).join("")}
      </tbody></table></div>`;
    }

    function apptActions(a, context) {
      if (context === "patient") return `${a.status === "Pendiente de pago" ? `<button onclick="setAppointmentStatus('${a.id}','Confirmada')">Realizar pago simulado</button>` : ""}${a.status === "Confirmada" ? `<button onclick="openZoom('${a.id}')">Ingresar a Zoom</button>` : ""}`;
      if (context === "doctor") return `<button onclick="startConsult('${a.id}')">Atender videoconsulta por Zoom</button><button onclick="finishConsult('${a.id}')">Finalizar consulta</button>`;
      return "";
    }

    function setAppointmentStatus(idValue, status) {
      write(K.appointments, read(K.appointments).map(a => a.id === idValue ? { ...a, status } : a));
      render();
    }

    function openZoom(idValue) {
      const a = read(K.appointments).find(x => x.id === idValue);
      if (!a.meetingUrl) return alert("La reunión de Zoom aún no ha sido creada.");
      window.open(a.meetingUrl, "_blank");
    }

    function doctorPanel(user) {
      const appts = read(K.appointments).filter(a => a.doctorId === user.id);
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("app").innerHTML = `
        <section class="wrap"><span class="eyebrow">${APP}</span><h1>Panel del Doctor</h1><p class="muted">Bienvenido, ${user.name} · ${user.specialty}</p>
        ${summary([["Citas asignadas", appts.length], ["Pacientes del día", appts.filter(a => a.date === today).length], ["Confirmadas", appts.filter(a => a.status === "Confirmada").length], ["En consulta", appts.filter(a => a.status === "En consulta").length], ["Finalizadas", appts.filter(a => a.status === "Finalizada").length]])}
        <div class="card"><h2>Citas asignadas</h2>${apptTable(appts, "doctor")}</div>
        <div id="docForm"></div></section>`;
    }

    function startConsult(idValue) {
      setAppointmentStatus(idValue, "En consulta");
      openZoom(idValue);
    }

    function finishConsult(idValue) {
      setAppointmentStatus(idValue, "Finalizada");
      const a = read(K.appointments).find(x => x.id === idValue);
      document.getElementById("docForm").innerHTML = `<div class="card"><h2>Generar documentos médicos simulados</h2><form class="form" onsubmit="saveDocs(event,'${a.id}','${a.patientId}')">
        <label>Receta médica<textarea id="prescription"></textarea></label><label>Recomendaciones<textarea id="recommendations"></textarea></label>
        <label>Órdenes de servicio<textarea id="orders"></textarea></label><label>Certificado médico<textarea id="certificate"></textarea></label><button>Guardar documentos</button>
      </form></div>`;
    }

    function saveDocs(event, appointmentId, patientId) {
      event.preventDefault();
      write(K.documents, [...read(K.documents), { id: id("doc"), patientId, appointmentId, createdAt: new Date().toLocaleString("es-EC"), documents: {
        prescription: document.getElementById("prescription").value,
        recommendations: document.getElementById("recommendations").value,
        orders: document.getElementById("orders").value,
        certificate: document.getElementById("certificate").value
      }}]);
      render();
    }

    function adminPanel(user) {
      const users = read(K.users), doctors = read(K.doctors), specs = read(K.specialties), appts = read(K.appointments);
      document.getElementById("app").innerHTML = `
        <section class="wrap"><span class="eyebrow">${APP}</span><h1>Panel Administrativo</h1><p class="muted">Bienvenido, ${user.name}</p>
        ${summary([["Total de pacientes", users.filter(u => u.role === "patient").length], ["Total de doctores", doctors.length], ["Total de citas", appts.length], ["Citas confirmadas", appts.filter(a => a.status === "Confirmada").length], ["Especialidades disponibles", specs.length]])}
        <div class="grid2">
          <div class="card"><h2>Usuarios registrados</h2><p><b>Pacientes:</b> ${users.filter(u => u.role === "patient").map(u => u.name).join(", ")}</p><p><b>Doctores:</b> ${doctors.map(d => d.name).join(", ")}</p><p><b>Administradores:</b> ${users.filter(u => u.role === "admin").map(u => u.name).join(", ")}</p></div>
          <div class="card"><h2>Gestionar doctores</h2><form class="form" onsubmit="saveDoctor(event)"><input id="doctorEditId" type="hidden"><label>Nombre completo<input id="docName" required></label><label>Correo<input id="docEmail" type="email" required></label><label>Especialidad<select id="docSpec">${specs.map(s => `<option>${s.name}</option>`).join("")}</select></label><label>Teléfono<input id="docPhone"></label><label>Estado<select id="docStatus"><option>Activo</option><option>Inactivo</option></select></label><label>Enlace personal de Zoom<input id="docZoom"></label><button>Guardar doctor</button></form><div class="stack">${doctors.map(d => `<div class="row"><span>${d.name} · ${d.specialty} · ${d.status}</span><span><button onclick="editDoctor('${d.id}')">Editar</button><button onclick="deleteDoctor('${d.id}')">Eliminar</button></span></div>`).join("")}</div></div>
        </div>
        <div class="grid2">
          <div class="card"><h2>Gestionar especialidades</h2><form class="form" onsubmit="saveSpecialty(event)"><label>Especialidad<input id="specName" required></label><button>Agregar especialidad</button></form><div class="stack">${specs.map(s => `<div class="row"><span>${s.name}</span><button onclick="deleteSpecialty('${s.id}')">Eliminar</button></div>`).join("")}</div></div>
          <div class="card"><h2>Aviso</h2><p class="muted">Los enlaces deben iniciar con https://zoom.us/ o https://us02web.zoom.us/.</p></div>
        </div>
        <div class="card"><h2>Gestionar citas</h2>${adminAppointments(appts)}</div></section>`;
    }

    function syncDoctors(doctors) {
      write(K.doctors, doctors);
      const users = read(K.users).filter(u => u.role !== "doctor");
      write(K.users, [...users, ...doctors.map(d => ({ ...d, role: "doctor", password: d.password || "123456" }))]);
    }
    function saveDoctor(event) {
      event.preventDefault();
      const doctors = read(K.doctors);
      const doctor = { id: document.getElementById("doctorEditId").value || id("doctor"), name: docName.value, email: docEmail.value, password: "123456", role: "doctor", specialty: docSpec.value, phone: docPhone.value, status: docStatus.value, zoom: docZoom.value };
      syncDoctors(doctors.some(d => d.id === doctor.id) ? doctors.map(d => d.id === doctor.id ? doctor : d) : [...doctors, doctor]);
      render();
    }
    function editDoctor(idValue) {
      const d = read(K.doctors).find(x => x.id === idValue);
      doctorEditId.value = d.id; docName.value = d.name; docEmail.value = d.email; docSpec.value = d.specialty; docPhone.value = d.phone; docStatus.value = d.status; docZoom.value = d.zoom || "";
    }
    function deleteDoctor(idValue) { syncDoctors(read(K.doctors).filter(d => d.id !== idValue)); render(); }
    function saveSpecialty(event) { event.preventDefault(); write(K.specialties, [...read(K.specialties), { id: id("spec"), name: specName.value }]); render(); }
    function deleteSpecialty(idValue) { write(K.specialties, read(K.specialties).filter(s => s.id !== idValue)); render(); }

    function adminAppointments(appts) {
      if (!appts.length) return `<p class="muted">No hay citas creadas.</p>`;
      return `<div class="tableWrap"><table><thead><tr><th>Paciente</th><th>Doctor</th><th>Especialidad</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Motivo</th><th>Enlace de Zoom</th><th>Acciones</th></tr></thead><tbody>${appts.map(a => `<tr><td>${a.patientName}</td><td>${a.doctorName}</td><td>${a.specialty}</td><td>${a.date}</td><td>${a.time}</td><td><select onchange="setAppointmentStatus('${a.id}', this.value)">${statuses.map(s => `<option ${s === a.status ? "selected" : ""}>${s}</option>`).join("")}</select></td><td>${a.reason}</td><td><input id="zoom-${a.id}" value="${a.meetingUrl || ""}"></td><td><button onclick="saveZoom('${a.id}')">Guardar Zoom</button><button onclick="setAppointmentStatus('${a.id}','Cancelada')">Cancelar cita</button></td></tr>`).join("")}</tbody></table></div>`;
    }
    function saveZoom(idValue) {
      const value = document.getElementById(`zoom-${idValue}`).value;
      if (value && !value.startsWith("https://zoom.us/") && !value.startsWith("https://us02web.zoom.us/")) return alert("El enlace de Zoom debe iniciar con https://zoom.us/ o https://us02web.zoom.us/.");
      write(K.appointments, read(K.appointments).map(a => a.id === idValue ? { ...a, meetingUrl: value } : a));
      render();
    }

    seedDemoData();
    render();
  </script>
</body>
</html>
